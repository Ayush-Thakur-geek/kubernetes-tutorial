apiVersion: apps/v1
kind: ReplicaSet
metadata: 
  name: myapp-rs
  labels:
    app: myapp
    type: frontend
spec:
  template:
    metadata:
      name: myapp-pod
      labels:
        app: myapp
        type: frontend
    spec:
        containers:
          - name: myapp-container
            image: nginx
            ports:
              - containerPort: 80
  replicas: 3
  selector:
    matchLabels:
      app: myapp
      type: frontend
    